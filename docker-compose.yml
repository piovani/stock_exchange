services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: stock_exchange
      POSTGRES_USER: stock
      POSTGRES_PASSWORD: stock
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stock -d stock_exchange"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
