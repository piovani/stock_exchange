syntax = "proto3";

package stock;

option go_package = "github.com/piovani/stock_exchange/pb/stock";

service StockService {
  rpc GetQuote(GetQuoteRequest) returns (GetQuoteResponse);
  rpc ListQuotes(ListQuotesRequest) returns (ListQuotesResponse);
  rpc SearchStocks(SearchStocksRequest) returns (SearchStocksResponse);
  rpc ListSymbols(ListSymbolsRequest) returns (ListSymbolsResponse);
}

message GetQuoteRequest {
  string symbol = 1;
}

message GetQuoteResponse {
  Quote quote = 1;
}

message ListQuotesRequest {
  repeated string symbols = 1;
}

message ListQuotesResponse {
  repeated Quote quotes = 1;
}

message SearchStocksRequest {
  string query = 1;
}

message SearchStocksResponse {
  repeated StockInfo results = 1;
}

message StockInfo {
  string symbol    = 1;
  string short_name = 2;
  string exchange  = 3;
  string type      = 4;
}

message ListSymbolsRequest {
  // "B3", "US" ou "" para todos
  string exchange = 1;
}

message ListSymbolsResponse {
  repeated StockInfo symbols = 1;
  int32 total = 2;
}

message Quote {
  string symbol         = 1;
  string short_name     = 2;
  double price          = 3;
  double change         = 4;
  double change_percent = 5;
  int64  timestamp      = 6;
}
